  </g>

  <text x="122" y="260" fill="#FFFFFF" font-family="Roboto, Arial, sans-serif" font-size="84" font-weight="700">ISO 31000:2018</text>
  <text x="122" y="334" fill="#BAE6FD" font-family="Roboto, Arial, sans-serif" font-size="44" font-weight="500">Gestão de Riscos</text>
