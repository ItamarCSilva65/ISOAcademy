<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ISO 31000:2018 — Gestão de Riscos (Capa V2)</title>
  <desc id="desc">Capa minimalista premium do curso ISO 31000 com foco em governança, contexto e decisão.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="485" x2="700" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1030" cy="130" r="240" fill="#38BDF8" fill-opacity="0.08"/>

  <path d="M0 560C210 470 390 610 630 520C820 448 1010 365 1200 430V675H0V560Z" fill="url(#accent)" fill-opacity="0.38"/>

  <rect x="86" y="88" width="770" height="500" rx="26" fill="#FFFFFF" fill-opacity="0.05" stroke="#BAE6FD" stroke-opacity="0.3" filter="url(#shadow)"/>

  <g transform="translate(118 122)">
    <rect width="156" height="40" rx="20" fill="#22D3EE" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.45"/>
